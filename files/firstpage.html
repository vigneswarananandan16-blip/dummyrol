<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cadbury Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #333; color: #fff; padding: 15px; text-align: center; }
        nav a { color: #fff; margin: 0 10px; text-decoration: none; }
        .products { display: flex; flex-wrap: wrap; padding: 20px; }
        .product { border: 1px solid #ccc; border-radius: 5px; margin: 10px; padding: 15px; width: 200px; text-align: center; }
        .product img { max-width: 100%; height: auto; }
        .product button { background: #28a745; color: #fff; border: none; padding: 10px; cursor: pointer; }
        .product button:hover { background: #218838; }
        footer { background: #f4f4f4; text-align: center; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to CADBURY Store</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="products">
        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Product 1">
            <h2>Product 1</h2>
            <p>$10.00</p>
            <button>Add to Cart</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Product 2">
            <h2>Product 2</h2>
            <p>$15.00</p>
            <button>Add to Cart</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Product 3">
            <h2>Product 3</h2>
            <p>$20.00</p>
            <button>Add to Cart</button>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My Simple E-Commerce Store</p>
    </footer>
</body>
</html>
